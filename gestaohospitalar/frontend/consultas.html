<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consultas</title>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
</head>

<body>

    <main class="dashboard-layout">

        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-logo">
                    <i class="ri-hospital-fill"></i>
                </div>
                <h2>Hospital</h2>
            </div>

            <nav class="sidebar-menu">
                <a href="./dashboard.html"><i class="ri-dashboard-line"></i>Dashboard</a>
                <a href="./pacientes.html"><i class="ri-user-heart-line"></i>Pacientes</a>
                <a href="./medicos.html"><i class="ri-stethoscope-line"></i>Médicos</a>
                <a href="./consultas.html" class="active"><i class="ri-calendar-check-line"></i>Consultas</a>
                <a href="./leitos.html"><i class="ri-hotel-bed-line"></i>Leitos</a>
                <a href="./internacoes.html"><i class="ri-building-line"></i>Internações</a>
                <a href="./prontuarios.html"><i class="ri-file-list-3-line"></i>Prontuários</a>
                <a href="./log.html"><i class="ri-error-warning-line"></i>Log de Erros</a>
            </nav>
        </aside>

        <section class="dashboard-content">

            <header class="dashboard-header">
                <div>
                    <h1>Consultas</h1>
                    <p>Agendamento e gerenciamento de consultas médicas.</p>
                </div>

                <button class="logout-button" onclick="logout()">
                    <i class="ri-logout-box-r-line"></i>
                    Sair
                </button>
            </header>

            <section class="page-actions">
                <div class="search-box">
                    <i class="ri-search-line"></i>
                    <input type="text" id="search-consultation"
                        placeholder="Buscar por paciente, médico ou status..." />
                </div>

                <button class="primary-button" id="open-consultation-modal">
                    <i class="ri-add-line"></i>
                    Nova consulta
                </button>
            </section>

            <section class="dashboard-table">
                <div class="table-header">
                    <h2>Lista de Consultas</h2>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Paciente</th>
                            <th>Médico</th>
                            <th>Data/Hora</th>
                            <th>Motivo</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="consultations-table-body">
                        <tr>
                            <td colspan="6">Carregando consultas...</td>
                        </tr>
                    </tbody>
                </table>
            </section>

        </section>

        <div class="modal-overlay" id="consultation-modal">
            <div class="modal">
                <div class="modal-header">
                    <h2>Nova consulta</h2>

                    <button class="modal-close" id="close-consultation-modal">
                        <i class="ri-close-line"></i>
                    </button>
                </div>

                <form id="consultation-form" class="modal-form">

                    <div class="input-group">
                        <label>Paciente</label>
                        <select id="consultation-patient" required>
                            <option value="">Selecione um paciente</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Médico</label>
                        <select id="consultation-doctor" required>
                            <option value="">Selecione um médico</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Data e hora</label>
                        <input type="datetime-local" id="consultation-date" required>
                    </div>

                    <div class="input-group">
                        <label>Motivo</label>
                        <input type="text" id="consultation-reason" placeholder="Ex: Retorno, dor, avaliação..."
                            required>
                    </div>

                    <div class="input-group">
                        <label>Status</label>
                        <select id="consultation-status">
                            <option value="Agendada">Agendada</option>
                            <option value="Concluída">Concluída</option>
                            <option value="Cancelada">Cancelada</option>
                        </select>
                    </div>

                    <button type="submit" class="primary-button">
                        Salvar consulta
                    </button>

                </form>
            </div>
        </div>

    </main>

    <script src="./js/api.js"></script>
    <script src="./js/consultas.js"></script>

</body>

</html>
