<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internações</title>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
</head>
<body>

<main class="dashboard-layout">

    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-logo">
                <i class="ri-hospital-fill"></i>
            </div>
            <h2>Hospital</h2>
        </div>

        <nav class="sidebar-menu">
            <a href="./dashboard.html"><i class="ri-dashboard-line"></i>Dashboard</a>
            <a href="./pacientes.html"><i class="ri-user-heart-line"></i>Pacientes</a>
            <a href="./medicos.html"><i class="ri-stethoscope-line"></i>Médicos</a>
            <a href="./consultas.html"><i class="ri-calendar-check-line"></i>Consultas</a>
            <a href="./leitos.html"><i class="ri-hotel-bed-line"></i>Leitos</a>
            <a href="./internacoes.html" class="active"><i class="ri-building-line"></i>Internações</a>
            <a href="./prontuarios.html"><i class="ri-file-list-3-line"></i>Prontuários</a>
            <a href="./log.html"><i class="ri-error-warning-line"></i>Log de Erros</a>
        </nav>
    </aside>

    <section class="dashboard-content">

        <header class="dashboard-header">
            <div>
                <h1>Internações</h1>
                <p>Controle de pacientes internados e alta hospitalar.</p>
            </div>

            <button class="logout-button" onclick="logout()">
                <i class="ri-logout-box-r-line"></i>
                Sair
            </button>
        </header>

        <section class="page-actions">
            <div class="search-box">
                <i class="ri-search-line"></i>
                <input type="text" id="search-internment" placeholder="Buscar por paciente, médico ou status..." />
            </div>

            <button class="primary-button" id="open-internment-modal">
                <i class="ri-add-line"></i>
                Nova internação
            </button>
        </section>

        <section class="dashboard-table">
            <div class="table-header">
                <h2>Lista de Internações</h2>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Paciente</th>
                        <th>Médico</th>
                        <th>Leito</th>
                        <th>Entrada</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="internments-table-body">
                    <tr>
                        <td colspan="6">Carregando internações...</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </section>

    <div class="modal-overlay" id="internment-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Nova internação</h2>

                <button class="modal-close" id="close-internment-modal">
                    <i class="ri-close-line"></i>
                </button>
            </div>

            <form id="internment-form" class="modal-form">

                <div class="input-group">
                    <label>Paciente</label>
                    <select id="internment-patient" required>
                        <option value="">Selecione um paciente</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Médico responsável</label>
                    <select id="internment-doctor" required>
                        <option value="">Selecione um médico</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Leito disponível</label>
                    <select id="internment-bed" required>
                        <option value="">Selecione um leito</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Motivo da internação</label>
                    <input type="text" id="internment-reason" placeholder="Ex: Observação, cirurgia, emergência..." required />
                </div>

                <button type="submit" class="primary-button">
                    Salvar internação
                </button>

            </form>
        </div>
    </div>

</main>

<script src="./js/api.js"></script>
<script src="./js/internacoes.js"></script>

</body>
</html>
