<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logs de Erro</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
</head>

<body>

    <main class="dashboard-layout">

        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-logo">
                    <i class="ri-hospital-fill"></i>
                </div>
                <h2>Hospital</h2>
            </div>

            <nav class="sidebar-menu">
                <a href="./dashboard.html">
                    <i class="ri-dashboard-line"></i>
                    Dashboard
                </a>
                <a href="./pacientes.html">
                    <i class="ri-user-heart-line"></i>
                    Pacientes
                </a>
                <a href="./medicos.html">
                    <i class="ri-stethoscope-line"></i>
                    Médicos
                </a>
                <a href="./consultas.html">
                    <i class="ri-calendar-check-line"></i>
                    Consultas
                </a>
                <a href="./leitos.html">
                    <i class="ri-hotel-bed-line"></i>
                    Leitos
                </a>
                <a href="./internacoes.html">
                    <i class="ri-building-line"></i>
                    Internações
                </a>
                <a href="./prontuarios.html">
                    <i class="ri-file-list-3-line"></i>
                    Prontuários
                </a>
                <a href="./log.html" class="active">
                    <i class="ri-error-warning-line"></i>
                    Log de Erros
                </a>
            </nav>
        </aside>

        <section class="dashboard-content">

            <header class="dashboard-header">
                <div>
                    <h1>Log de Erros</h1>
                    <p>Registros de falhas e mensagens de erro do sistema.</p>
                </div>

                <button class="logout-button" onclick="logout()">
                    <i class="ri-logout-box-r-line"></i>
                    Sair
                </button>
            </header>

            <div class="dashboard-table">
                <div class="table-header">
                    <h2>Erros registrados</h2>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Data / Hora</th>
                            <th>Página</th>
                            <th>Ação</th>
                            <th>Mensagem</th>
                            <th>Detalhes</th>
                        </tr>
                    </thead>
                    <tbody id="error-log-body">
                        <tr>
                            <td colspan="5">Carregando logs...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="page-actions" style="margin-top: 24px;">
                <button class="primary-button" id="refresh-log-button">
                    <i class="ri-refresh-line"></i>
                    Atualizar
                </button>
                <button class="action-button delete" id="clear-log-button">
                    <i class="ri-delete-bin-line"></i>
                    Limpar logs
                </button>
            </div>

        </section>

    </main>

    <script src="./js/api.js"></script>
    <script src="./js/log.js"></script>
</body>

</html>
